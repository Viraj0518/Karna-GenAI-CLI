name: Feature Request
description: Propose a new feature or enhancement
title: "[feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem first, then the proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What is the user problem or pain point? Who is affected?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should Karna / Nellie address this? UX sketches welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they were rejected.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Core CLI / harness
        - Agents / tools
        - Security / sandboxing
        - Docs
        - CI / release
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
