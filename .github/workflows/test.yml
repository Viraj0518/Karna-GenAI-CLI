name: tests

on:
  push:
    branches: [main, dev]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # We test against the min (3.10) and max (3.12) supported Python.
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.12"]
        include:
          - os: windows-latest
            python-version: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,tokens,cron]"

      - name: Run pytest (unit + smoke)
        # -m "not integration and not live" skips integration stubs and
        # live-API tests that require real credentials / external network.
        run: python -m pytest tests/ -v -m "not integration and not live" --ignore=tests/integration

      - name: Run pytest (integration, allow-skip)
        # Integration stubs may skip today. Running them explicitly so a
        # regression ("stopped skipping, started failing") is surfaced.
        continue-on-error: true
        run: python -m pytest tests/integration/ -v
