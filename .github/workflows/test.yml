name: tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # We test against the min (3.10) and max (3.12) supported Python.
      # Dropped 3.11 from the PR matrix: a 3.11-specific regression
      # that doesn't reproduce on 3.10 or 3.12 is a near-zero slice of
      # the world and doesn't justify a 3rd matrix job on every push.
      # If we start caring about it we'll add a nightly full-matrix run.
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.12"]
        include:
          - os: windows-latest
            python-version: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest (unit + smoke)
        # -m "not integration and not live" skips the alpha-gated stubs
        # (REST / ACP / recipes / computer_controller) and the live-API
        # tests. Those run in their own step below with continue-on-error.
        run: python -m pytest tests/ -v -m "not integration and not live"

      - name: Run pytest (integration, allow-skip)
        # Integration stubs are *expected* to skip today. Running them
        # explicitly so a regression ("stopped skipping, started failing")
        # is surfaced on the PR that added the feature that unskipped them.
        continue-on-error: true
        run: python -m pytest tests/integration/ -v -m "integration"
