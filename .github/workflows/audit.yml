name: audit

on:
  schedule:
    - cron: "0 9 * * 1"  # Mondays at 09:00 UTC
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: pip-audit + bandit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit bandit

      - name: Run pip-audit against installed environment
        shell: bash
        run: pip-audit -r <(pip freeze)

      - name: Run bandit (non-blocking; agent code has many false positives)
        continue-on-error: true
        run: bandit -r karna -ll
