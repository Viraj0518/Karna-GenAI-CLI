name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Min + max supported Python. 3.11 dropped to halve matrix time.
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tokens,cron]"

      - name: Lint
        run: ruff check karna/

      - name: Test
        # Skip tests/integration/ — those stubs require features not yet
        # merged to main. They run in test.yml with continue-on-error.
        run: pytest tests/ -q --tb=short --ignore=tests/integration

      - name: Import check
        run: python -c "import karna; print(f'karna {karna.__version__} OK')"
