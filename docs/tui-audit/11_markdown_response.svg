</text><text class="terminal-282141403-r4" x="0" y="93.2" textLength="1220" clip-path="url(#terminal-282141403-line-3)">Here&#x27;s&#160;how&#160;to&#160;fix&#160;the&#160;authentication&#160;issue:&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text class="terminal-282141403-r2" x="1220" y="93.2" textLength="12.2" clip-path="url(#terminal-282141403-line-3)">
