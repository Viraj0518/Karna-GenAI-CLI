<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="50%" style="stop-color:#5A8FCC"/>
      <stop offset="100%" style="stop-color:#3C73BD"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3C73BD"/>
      <stop offset="50%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#3C73BD"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" rx="12" fill="#0D1117"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Grid pattern (subtle) -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <rect width="20" height="20" fill="none"/>
    <rect width="1" height="1" x="0" y="0" fill="#1a1f2e" opacity="0.5"/>
  </pattern>
  <rect width="1200" height="200" fill="url(#grid)"/>

  <!-- Terminal cursor block -->
  <rect x="40" y="55" width="8" height="90" fill="#87CEEB" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- NELLIE text -->
  <text x="70" y="130" font-family="'Courier New', 'Monaco', 'Consolas', monospace" font-size="110" font-weight="900" fill="url(#textGrad)" filter="url(#shadow)" letter-spacing="8">NELLIE</text>

  <!-- Subtitle -->
  <text x="72" y="165" font-family="'Courier New', 'Monaco', 'Consolas', monospace" font-size="16" fill="#5F6472" letter-spacing="6">KARNA'S AI CODING AGENT</text>

  <!-- Right side decorative pixel blocks -->
  <g transform="translate(950, 60)" opacity="0.6">
    <rect x="0" y="0" width="16" height="16" fill="#87CEEB" rx="2"/>
    <rect x="20" y="0" width="16" height="16" fill="#5A8FCC" rx="2"/>
    <rect x="40" y="0" width="16" height="16" fill="#3C73BD" rx="2"/>
    <rect x="0" y="20" width="16" height="16" fill="#5A8FCC" rx="2"/>
    <rect x="20" y="20" width="16" height="16" fill="#3C73BD" rx="2"/>
    <rect x="40" y="20" width="16" height="16" fill="#87CEEB" rx="2"/>
    <rect x="0" y="40" width="16" height="16" fill="#3C73BD" rx="2"/>
    <rect x="20" y="40" width="16" height="16" fill="#87CEEB" rx="2"/>
    <rect x="40" y="40" width="16" height="16" fill="#5A8FCC" rx="2"/>
  </g>

  <!-- Version badge -->
  <g transform="translate(1040, 70)">
    <rect width="110" height="28" rx="14" fill="#1F2937" stroke="#3C73BD" stroke-width="1" opacity="0.8"/>
    <text x="55" y="19" font-family="'Courier New', monospace" font-size="13" fill="#87CEEB" text-anchor="middle" font-weight="bold">v0.1.0</text>
  </g>

  <!-- Tool count badge -->
  <g transform="translate(1040, 108)">
    <rect width="110" height="28" rx="14" fill="#1F2937" stroke="#5A8FCC" stroke-width="1" opacity="0.8"/>
    <text x="55" y="19" font-family="'Courier New', monospace" font-size="13" fill="#5A8FCC" text-anchor="middle">17 tools</text>
  </g>

  <!-- Accent line bottom -->
  <rect x="0" y="197" width="1200" height="3" rx="1" fill="url(#accentLine)"/>
</svg>
